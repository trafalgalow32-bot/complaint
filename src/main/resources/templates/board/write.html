<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<div layout:fragment="main">
    <div class="w-[500px] mx-auto mt-5">
      <form th:object="${complainWriteDto}" method="post" th:action="@{/writeSave}" enctype="multipart/form-data">
        제목 : <input class="border rounded" type="text" th:field="*{title}"> <br>
        민원유형 : <select class="border rounded" th:field="*{category}">
                        <option value="시설">시설</option>
                        <option value="교통">교통</option>
                        <option value="출결">출결</option>
                        <option value="취업">취업</option>
        </select> <br>
        내용 : <textarea class="border rounded p-2 w-full h-[100px]"
                       th:field="*{content}"></textarea> <br>

        <div th:each="num : ${#numbers.sequence(1, 3)}">
            이미지 : <input class="border rounded" type="file" name="imgFile">
        </div>

        <button>작성</button>
      </form>

    </div>
</div>
</html>
