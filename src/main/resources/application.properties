spring.application.name=complaint


server.port=80

#File upload Path Set
spring.servlet.multipart.maxFileSize=20MB
spring.servlet.multipart.maxRequestSize=70MB
filePath=C:/KHK/complainimage/
uploadPath=file:///C:/KHK/complainimage

#thymeleaf set
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

#Database Set
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/hkkim
spring.datasource.username=hkkim
spring.datasource.password=1234

#myBatis Set
mybatis.mapper-locations=classpath:/mappers/**.xml
mybatis.configuration.map-underscore-to-camel-case=true

#spring.security.user.name=aaa
#spring.security.user.password=1234